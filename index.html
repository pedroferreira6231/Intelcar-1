<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Intelcar 2.7</title>
<style>
  :root{
    --green:#00ff58;
    --red:#ff2020;
    --blue:#00b7ff;
    --bg:#020407;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;padding:0;width:100%;min-height:100%;background:var(--bg);color:white;
    font-family:Arial,Helvetica,sans-serif;overflow-x:hidden;touch-action:manipulation;
  }
  body{display:flex;align-items:flex-start;justify-content:center;}
  .stage{width:100vw;max-width:1536px;margin:0 auto;position:relative;}
  .app{
    position:relative;width:100%;aspect-ratio:3/2;margin:0 auto;
    background-image:url("intelcar-oficial.jpg");background-size:contain;background-repeat:no-repeat;background-position:top center;
  }
  .hotspot{position:absolute;border:0;background:transparent;color:transparent;cursor:pointer;padding:0;border-radius:14px;}
  .hotspot:active{outline:2px solid rgba(0,255,80,.8);background:rgba(0,255,80,.10);}
  .state-dot{position:absolute;width:1.7%;aspect-ratio:1/1;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);pointer-events:none;transition:.25s;}
  .state-dot.off{background:var(--red);box-shadow:0 0 12px var(--red);}
  .status-overlay{position:absolute;left:1.8%;top:5.2%;display:flex;align-items:center;gap:.55vw;font-size:clamp(12px,2vw,32px);font-weight:700;color:var(--green);text-shadow:0 0 8px var(--green);pointer-events:none;}
  .status-overlay.off{color:var(--red);text-shadow:0 0 8px var(--red);}
  .system-text{position:absolute;right:1.2%;bottom:1.6%;font-size:clamp(10px,1.15vw,18px);color:var(--green);opacity:.9;pointer-events:none;}
  .system-text.off{color:var(--red);}
  .toast{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:20;max-width:92vw;
    background:rgba(0,0,0,.82);border:1px solid var(--blue);box-shadow:0 0 16px rgba(0,183,255,.45);
    color:white;border-radius:14px;padding:10px 14px;font-size:16px;text-align:center;display:none;
  }
  .portrait-warning{display:none;position:fixed;left:10px;right:10px;bottom:10px;padding:10px;border-radius:12px;background:rgba(0,0,0,.80);color:var(--green);font-size:14px;text-align:center;z-index:10;border:1px solid var(--green);}

  @media (orientation: portrait){
    body{display:block}.stage{margin-top:58px}.portrait-warning{display:block}
  }
  @media (orientation: landscape){
    html,body{height:100%;overflow:hidden}.stage{height:100vh;width:min(100vw,150vh)}.app{width:100%;height:auto}
  }

  /* Áreas clicáveis da maquete oficial */
  #btn-ligar{left:1.2%;top:16.2%;width:15.8%;height:26.8%}
  #btn-velocidade{left:17.8%;top:16.2%;width:15.3%;height:26.8%}
  #btn-microfone{left:34.0%;top:16.2%;width:15.3%;height:26.8%}
  #btn-destino{left:50.2%;top:16.2%;width:15.3%;height:26.8%}
  #btn-gps{left:66.2%;top:16.2%;width:15.3%;height:26.8%}
  #btn-maps{left:82.4%;top:16.2%;width:16.2%;height:26.8%}
  #btn-ai-plus{left:1.2%;top:44.7%;width:15.8%;height:24.7%}
  #btn-alerta-velocidade{left:17.8%;top:44.7%;width:15.3%;height:24.7%}
  #btn-alerta-distracao{left:34.0%;top:44.7%;width:15.3%;height:24.7%}
  #btn-alerta-cansaco{left:50.2%;top:44.7%;width:15.3%;height:24.7%}
  #btn-alerta-meteo{left:66.2%;top:44.7%;width:15.3%;height:24.7%}
  #btn-alerta-conducao{left:82.4%;top:44.7%;width:16.2%;height:24.7%}
  #btn-config{left:1.2%;top:71.2%;width:48.0%;height:15.8%}
  #btn-sos{left:50.2%;top:71.2%;width:48.4%;height:15.8%}
  #btn-som{left:78%;top:88%;width:20%;height:8%}

  /* Pontos de estado sobrepostos aos pontos da imagem */
  #dot-ligar{left:6.6%;top:36.1%}
  #dot-velocidade{left:23.0%;top:36.1%}
  #dot-microfone{left:39.4%;top:36.1%}
  #dot-destino{left:55.7%;top:36.1%}
  #dot-gps{left:71.8%;top:36.1%}
  #dot-maps{left:88.1%;top:36.1%}
  #dot-ai-plus{left:6.6%;top:63.2%}
  #dot-alerta-velocidade{left:23.0%;top:63.2%}
  #dot-alerta-distracao{left:39.4%;top:63.2%}
  #dot-alerta-cansaco{left:55.7%;top:63.2%}
  #dot-alerta-meteo{left:71.8%;top:63.2%}
  #dot-alerta-conducao{left:88.1%;top:63.2%}
  #dot-config{left:19.7%;top:79.4%}
  #dot-sos{left:65.5%;top:79.4%}
</style>
</head>
<body>
<div class="stage">
  <div class="app" aria-label="Intelcar 2.7 interface oficial funcional">
    <div id="topStatus" class="status-overlay"><span>●</span><span id="topStatusText">ATIVO</span></div>
    <div id="systemText" class="system-text">SISTEMA ATIVO</div>

    <button class="hotspot" id="btn-ligar" onclick="alternarIntelcar()">Ligar / Desligar</button>
    <button class="hotspot" id="btn-velocidade" onclick="mostrarVelocidade()">Velocidade</button>
    <button class="hotspot" id="btn-microfone" onclick="alternarModulo('microfone','Microfone')">Microfone</button>
    <button class="hotspot" id="btn-destino" onclick="definirDestino()">Destino</button>
    <button class="hotspot" id="btn-gps" onclick="alternarGPS()">GPS interno</button>
    <button class="hotspot" id="btn-maps" onclick="abrirMaps()">Google Maps</button>
    <button class="hotspot" id="btn-ai-plus" onclick="alternarModulo('aiPlus','AI Plus')">AI Plus</button>
    <button class="hotspot" id="btn-alerta-velocidade" onclick="alternarModulo('alertaVelocidade','Alerta velocidade')">Alerta velocidade</button>
    <button class="hotspot" id="btn-alerta-distracao" onclick="alternarModulo('alertaDistracao','Alerta distração')">Alerta distração</button>
    <button class="hotspot" id="btn-alerta-cansaco" onclick="alternarModulo('alertaCansaco','Alerta cansaço')">Alerta cansaço</button>
    <button class="hotspot" id="btn-alerta-meteo" onclick="alternarModulo('alertaMeteo','Alerta meteo')">Alerta meteo</button>
    <button class="hotspot" id="btn-alerta-conducao" onclick="alternarModulo('alertaConducao','Alerta condução perigosa')">Alerta condução perigosa</button>
    <button class="hotspot" id="btn-config" onclick="abrirConfiguracoes()">Configurações</button>
    <button class="hotspot" id="btn-sos" onclick="acionarSOS()">Alerta SOS</button>
    <button class="hotspot" id="btn-som" onclick="alternarModulo('som','Som')">Som ativo</button>

    <span class="state-dot" id="dot-ligar"></span><span class="state-dot" id="dot-velocidade"></span><span class="state-dot" id="dot-microfone"></span><span class="state-dot" id="dot-destino"></span><span class="state-dot" id="dot-gps"></span><span class="state-dot" id="dot-maps"></span><span class="state-dot" id="dot-ai-plus"></span><span class="state-dot" id="dot-alerta-velocidade"></span><span class="state-dot" id="dot-alerta-distracao"></span><span class="state-dot" id="dot-alerta-cansaco"></span><span class="state-dot" id="dot-alerta-meteo"></span><span class="state-dot" id="dot-alerta-conducao"></span><span class="state-dot" id="dot-config"></span><span class="state-dot" id="dot-sos"></span>
  </div>
</div>
<div id="toast" class="toast"></div>
<div class="portrait-warning">Para ficar igual à maquete oficial, vira o telemóvel na horizontal.</div>
<script>
let intelcarLigada = true;
let gpsWatchId = null;
let velocidadeAtual = 0;
let destinoAtual = '';
const modulos = {
  velocidade:true,microfone:true,destino:true,gps:true,maps:true,aiPlus:true,
  alertaVelocidade:true,alertaDistracao:true,alertaCansaco:true,alertaMeteo:true,alertaConducao:true,
  config:true,sos:false,som:true
};
const dotMap = {
  velocidade:'dot-velocidade',microfone:'dot-microfone',destino:'dot-destino',gps:'dot-gps',maps:'dot-maps',aiPlus:'dot-ai-plus',
  alertaVelocidade:'dot-alerta-velocidade',alertaDistracao:'dot-alerta-distracao',alertaCansaco:'dot-alerta-cansaco',alertaMeteo:'dot-alerta-meteo',alertaConducao:'dot-alerta-conducao',
  config:'dot-config',sos:'dot-sos'
};
function falar(texto){
  try{ if(!modulos.som) return; const u=new SpeechSynthesisUtterance(texto); u.lang='pt-PT'; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){}
}
function aviso(texto){
  const t=document.getElementById('toast'); t.textContent=texto; t.style.display='block'; clearTimeout(window._toastTimer); window._toastTimer=setTimeout(()=>t.style.display='none',2600);
}
function setDot(id,on){ const el=document.getElementById(id); if(!el) return; el.classList.toggle('off',!on); }
function atualizarTudo(){
  setDot('dot-ligar',intelcarLigada);
  document.getElementById('topStatusText').textContent=intelcarLigada?'ATIVO':'DESLIGADO';
  document.getElementById('topStatus').classList.toggle('off',!intelcarLigada);
  document.getElementById('systemText').textContent=intelcarLigada?'SISTEMA ATIVO':'SISTEMA DESLIGADO';
  document.getElementById('systemText').classList.toggle('off',!intelcarLigada);
  Object.keys(dotMap).forEach(k=>setDot(dotMap[k], intelcarLigada && !!modulos[k]));
}
function alternarIntelcar(){
  intelcarLigada=!intelcarLigada;
  if(intelcarLigada){
    Object.keys(modulos).forEach(k=>{ if(k!=='sos') modulos[k]=true; });
    aviso('Intelcar iniciada. Sistemas ativos.'); falar('Intelcar iniciada. Sistemas ativos.'); iniciarGPS();
  }else{
    pararGPS(); aviso('Intelcar desligada.'); falar('Intelcar desligada. Até breve.');
  }
  atualizarTudo();
}
function bloquearSeDesligada(){ if(!intelcarLigada){ aviso('Intelcar está desligada.'); return true; } return false; }
function alternarModulo(chave,nome){
  if(bloquearSeDesligada()) return;
  modulos[chave]=!modulos[chave];
  atualizarTudo();
  const estado=modulos[chave]?'ativo':'desligado'; aviso(nome+' '+estado+'.'); falar(nome+' '+estado+'.');
}
function iniciarGPS(){
  if(!navigator.geolocation) { aviso('GPS não disponível neste telemóvel.'); return; }
  if(gpsWatchId!==null) return;
  gpsWatchId=navigator.geolocation.watchPosition(pos=>{
    if(pos.coords.speed!=null && !isNaN(pos.coords.speed)) velocidadeAtual=Math.max(0, Math.round(pos.coords.speed*3.6));
  }, err=>aviso('GPS: '+err.message), {enableHighAccuracy:true, maximumAge:1000, timeout:10000});
}
function pararGPS(){ if(gpsWatchId!==null){ navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId=null; } }
function alternarGPS(){ if(bloquearSeDesligada()) return; modulos.gps=!modulos.gps; if(modulos.gps) iniciarGPS(); else pararGPS(); atualizarTudo(); aviso(modulos.gps?'GPS interno ativo.':'GPS interno desligado.'); }
function mostrarVelocidade(){ if(bloquearSeDesligada()) return; const msg='Velocidade atual '+velocidadeAtual+' quilómetros por hora.'; aviso(msg); falar(msg); }
function definirDestino(){ if(bloquearSeDesligada()) return; const d=prompt('Destino:'); if(d){ destinoAtual=d; modulos.destino=true; atualizarTudo(); aviso('Destino definido: '+d); falar('Destino definido.'); } }
function abrirMaps(){ if(bloquearSeDesligada()) return; const url=destinoAtual ? 'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(destinoAtual) : 'https://www.google.com/maps'; window.open(url,'_blank'); }
function abrirConfiguracoes(){ aviso('Configurações ainda em preparação.'); }
function acionarSOS(){ if(bloquearSeDesligada()) return; modulos.sos=!modulos.sos; atualizarTudo(); aviso(modulos.sos?'SOS ativo.':'SOS desligado.'); falar(modulos.sos?'Alerta SOS ativo.':'Alerta SOS desligado.'); }
atualizarTudo(); iniciarGPS();
</script>
</body>
</html>
