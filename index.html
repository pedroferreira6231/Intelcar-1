
<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Intelcar 2.7</title>
<style>
:root{
  --bg:#05070b;
  --panel:#0c111a;
  --panel2:#111827;
  --text:#f5f7fb;
  --muted:#9aa7b8;
  --green:#21ff7a;
  --red:#ff314a;
  --blue:#24b8ff;
  --purple:#b45cff;
  --orange:#ffb020;
  --cyan:#23ffd7;
  --white:#f3f7ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;width:100%;height:100%;background:radial-gradient(circle at top,#152035 0%,#06080d 48%,#020308 100%);color:var(--text);font-family:Arial,Helvetica,sans-serif;overflow:hidden;}
.app{width:100vw;height:100vh;padding:10px;display:flex;flex-direction:column;gap:8px;}
.topbar{height:52px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;}
.status-left,.status-right{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.status-right{justify-content:flex-end;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);display:inline-block;}
.logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;}
.logo{position:relative;border:4px solid var(--white);border-radius:12px;padding:5px 26px;background:linear-gradient(180deg,#101722,#05070b);box-shadow:0 0 18px rgba(255,255,255,.22), inset 0 0 14px rgba(255,255,255,.08);font-size:26px;font-weight:900;letter-spacing:3px;color:#fff;text-shadow:0 0 10px rgba(255,255,255,.7);}
.logo:before,.logo:after{content:"";position:absolute;top:50%;width:34px;height:3px;background:repeating-linear-gradient(90deg,#fff 0 10px,transparent 10px 17px);opacity:.9;transform:translateY(-50%);}
.logo:before{left:8px;}
.logo:after{right:8px;}
.logo span{position:relative;z-index:2;background:#07101a;padding:0 8px;}
.angel{width:42px;height:42px;border-radius:12px;background:linear-gradient(145deg,#f4f7ff,#73809a);box-shadow:0 0 14px rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:25px;}
.version{font-size:11px;color:var(--muted);letter-spacing:2px;margin-left:2px;}
.grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:9px;min-height:0;}
.tile{border-radius:18px;border:2px solid rgba(255,255,255,.12);background:linear-gradient(160deg,#111827,#060a10);box-shadow:inset 0 0 18px rgba(255,255,255,.03),0 8px 18px rgba(0,0,0,.35);padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-width:0;min-height:0;color:white;}
.tile:active{transform:scale(.98);}
.icon{font-size:26px;line-height:1;filter:drop-shadow(0 0 6px currentColor);}
.label{font-size:13px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;text-align:center;line-height:1.05;}
.value{font-size:18px;font-weight:900;}
.pill{font-size:10px;font-weight:900;padding:3px 8px;border-radius:999px;border:1px solid currentColor;background:rgba(0,0,0,.25);}
.on .pill{color:var(--green);box-shadow:0 0 8px rgba(33,255,122,.35);}
.off .pill{color:var(--red);box-shadow:0 0 8px rgba(255,49,74,.35);}
.power{border-color:rgba(33,255,122,.45);}
.ai{border-color:rgba(180,92,255,.5);color:var(--purple);}
.mic{border-color:rgba(35,255,215,.45);color:var(--cyan);}
.speed{border-color:rgba(36,184,255,.5);color:var(--blue);}
.destino{border-color:rgba(180,92,255,.5);color:var(--purple);}
.gps{border-color:rgba(36,184,255,.5);color:var(--blue);}
.maps{border-color:rgba(33,255,122,.45);color:var(--green);}
.alerta{border-color:rgba(255,176,32,.55);color:var(--orange);}
.sos{border-color:rgba(255,49,74,.75);color:var(--red);}
.settings{border-color:rgba(255,255,255,.35);color:#fff;}
.bottom{height:72px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.big{border-radius:20px;border-width:3px;}
.footer{height:20px;display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:11px;letter-spacing:.8px;padding:0 4px;}
@media (orientation:portrait){
  .app{padding:8px;overflow:auto;height:auto;min-height:100vh;}
  html,body{overflow:auto;}
  .topbar{height:auto;grid-template-columns:1fr;gap:6px;}
  .status-left,.status-right{justify-content:center;}
  .logo{font-size:23px;padding:5px 22px;}
  .angel{width:38px;height:38px;}
  .grid{grid-template-columns:repeat(3,1fr);grid-template-rows:none;flex:none;}
  .tile{height:92px;border-radius:16px;}
  .bottom{height:auto;grid-template-columns:1fr 1fr;}
  .big{height:80px;}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="status-left"><span class="dot"></span> BLUETOOTH <span id="hora">--:--</span></div>
    <div class="logo-wrap"><div class="logo"><span>INTELCAR</span></div><div class="angel">👼</div></div>
    <div class="status-right"><span>GPS</span><span class="dot"></span><span class="version">2.7</span></div>
  </div>

  <div class="grid">
    <button class="tile power on" onclick="togglePower(this)"><div class="icon">⏻</div><div class="label">Ligar / Desligar</div><div class="pill">ATIVO</div></button>
    <button class="tile ai on" onclick="toggleTile(this)"><div class="icon">🤖</div><div class="label">AI</div><div class="pill">ATIVO</div></button>
    <button class="tile ai off" onclick="toggleTile(this)"><div class="icon">✦</div><div class="label">AI Plus</div><div class="pill">DESLIGADO</div></button>
    <button class="tile mic off" onclick="toggleTile(this)"><div class="icon">🎤</div><div class="label">Microfone</div><div class="pill">DESLIGADO</div></button>

    <button class="tile speed on" onclick="toggleTile(this)"><div class="icon">🚗</div><div class="label">Velocidade</div><div class="value" id="speed">0 km/h</div><div class="pill">ATIVO</div></button>
    <button class="tile destino off" onclick="toggleTile(this)"><div class="icon">📍</div><div class="label">Destino</div><div class="pill">DESLIGADO</div></button>
    <button class="tile gps on" onclick="toggleTile(this)"><div class="icon">🛰️</div><div class="label">GPS Interno</div><div class="pill">ATIVO</div></button>
    <button class="tile maps off" onclick="toggleTile(this)"><div class="icon">🗺️</div><div class="label">Google Maps</div><div class="pill">DESLIGADO</div></button>

    <button class="tile alerta off" onclick="toggleTile(this)"><div class="icon">⚡</div><div class="label">Alerta Velocidade</div><div class="pill">DESLIGADO</div></button>
    <button class="tile alerta off" onclick="toggleTile(this)"><div class="icon">👀</div><div class="label">Alerta Distração</div><div class="pill">DESLIGADO</div></button>
    <button class="tile alerta off" onclick="toggleTile(this)"><div class="icon">😴</div><div class="label">Alerta Cansaço</div><div class="pill">DESLIGADO</div></button>
    <button class="tile alerta off" onclick="toggleTile(this)"><div class="icon">🌧️</div><div class="label">Alerta Meteo</div><div class="pill">DESLIGADO</div></button>

    <button class="tile alerta off" onclick="toggleTile(this)"><div class="icon">⚠️</div><div class="label">Alerta Condução</div><div class="pill">DESLIGADO</div></button>
  </div>

  <div class="bottom">
    <button class="tile settings big off" onclick="toggleTile(this)"><div class="icon">⚙️</div><div class="label">Configurações</div><div class="pill">DESLIGADO</div></button>
    <button class="tile sos big off" onclick="toggleTile(this)"><div class="icon">🆘</div><div class="label">Alerta SOS</div><div class="pill">DESLIGADO</div></button>
  </div>

  <div class="footer"><span>INTELCAR 2.7</span><span id="estadoGeral">SISTEMA ATIVO</span></div>
</div>

<script>
function setStatus(button, active){
  button.classList.toggle('on', active);
  button.classList.toggle('off', !active);
  const pill = button.querySelector('.pill');
  if(pill){ pill.textContent = active ? 'ATIVO' : 'DESLIGADO'; }
}
function toggleTile(button){
  const active = !button.classList.contains('on');
  setStatus(button, active);
}
function togglePower(button){
  const active = !button.classList.contains('on');
  setStatus(button, active);
  document.getElementById('estadoGeral').textContent = active ? 'SISTEMA ATIVO' : 'SISTEMA DESLIGADO';
  document.querySelectorAll('.tile').forEach(function(tile){
    if(tile !== button){ setStatus(tile, active); }
  });
}
function atualizarHora(){
  const agora = new Date();
  document.getElementById('hora').textContent = agora.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
}
atualizarHora();
setInterval(atualizarHora, 30000);
</script>
</body>
</html>
